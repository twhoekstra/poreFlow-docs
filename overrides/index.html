    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>

    <script>
        function run_anim(colorScheme) {
            const container = document.getElementById('threejs-container');
            const loading = document.getElementById('loading');

            // Create the scene
            const scene = new THREE.Scene();

            // Set background color based on the color scheme
            if (colorScheme === 'slate') {
                scene.background = new THREE.Color(0x222222); // Dark background for slate
            } else {
                scene.background = new THREE.Color(0xFFFFFF); // Light background for default
            }

            // Create the camera
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 1.5;

            // Create the renderer
             const renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('threejs-canvas'),
                antialias: true,
                 // alpha: true,
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Add lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(0, 0, 1);
            directionalLight.target.position.set(0, 0, -1); // Point the light forward
            // camera.add(directionalLight);
            // scene.add(directionalLight.target);
            scene.add(directionalLight);

            let model;
            const loader = new THREE.OBJLoader();
            loader.load(
                'assets/models/mspA.obj',
                (object) => {
                    // Apply a single material to all meshes
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x543391,
                        roughness: 0.5,
                        metalness: 0.5
                    });
                    object.traverse((child) => {
                        if (child instanceof THREE.Mesh) {
                            child.material = material;
                        }
                    });
                    model = object;
                    scene.add(object);
                    loading.style.display = 'none';
                },
                // (xhr) => {
                //     console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                // },
                // (error) => {
                //     console.error('An error happened', error);
                //     loading.textContent = 'Failed to load model';
                // }
            );


            // Add OrbitControls
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false;


            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                if (model){
                    // model.rotation.y += 0.01;
                    model.rotation.y += 0.001;
                }
                renderer.render(scene, camera);
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            // Start animation
            loading.style.display = 'none';
            animate();
        }


    document.addEventListener('DOMContentLoaded', () => {
        const currentScheme = document.body.getAttribute('data-md-color-scheme')
        run_anim(currentScheme);

        // Subscribe to document$
        if (window.document$) {
            document$.subscribe(function() {
                const currentScheme = document.body.getAttribute('data-md-color-scheme')
                run_anim(currentScheme);
            });
        }

        // Rerun on theme change
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'data-md-color-scheme') {
                    const newScheme = document.body.getAttribute('data-md-color-scheme');
                    run_anim(newScheme);
                }
            });
        });

        observer.observe(document.body, {
            attributes: true,
            attributeFilter: ['data-md-color-scheme']
        });
    });
    </script>
