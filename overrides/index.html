    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.132.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        function run_anim(colorScheme) {
            const container = document.getElementById('threejs-container');
            const loading = document.getElementById('loading');

             // Create the renderer
            const renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('threejs-canvas'),
                antialias: true,
                 // alpha: true,
            });
            renderer.setPixelRatio( container.devicePixelRatio );
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set( 1.5, 1.0, 1.5 );


            const scene = new THREE.Scene();
            let ground_mat;
            if (colorScheme === 'slate') {
                scene.background = new THREE.Color(0x000000); // Dark background for slate
                scene.fog = new THREE.Fog( 0x000000, 6, 12 );
                ground_mat = new THREE.MeshPhongMaterial( { color: 0x111111, depthWrite: false } )
            } else {
                scene.background = new THREE.Color(0xFFFFFF); // Light background for default
                scene.fog = new THREE.Fog( 0xFFFFFF, 6, 12 );
                ground_mat = new THREE.MeshPhongMaterial( { color: 0xbbbbbb, depthWrite: false } )
            }
            // scene.background = new THREE.Color(0xFFFFFF);
            // scene.environment = pmremGenerator.fromScene( new RoomEnvironment(), 0.04 ).texture;


            // Add lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            ambientLight.position.set( 0, 20, 0 );
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight( 0xffffff, 3 );
            directionalLight.position.set( 0, 20, 10 );
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.top = 2;
            directionalLight.shadow.camera.bottom = - 2;
            directionalLight.shadow.camera.left = - 2;
            directionalLight.shadow.camera.right = 2;
            scene.add( directionalLight );

            // ground

            const ground = new THREE.Mesh( new THREE.PlaneGeometry( 40, 40 ), ground_mat);
            ground.rotation.x = - Math.PI / 2;
            ground.receiveShadow = true;
            scene.add( ground );

            const grid = new THREE.GridHelper( 40, 20, 0x000000, 0x000000 );
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add( grid );

            let model;
            const loader = new OBJLoader();
            loader.load(
                'assets/models/mspA.obj',
                (object) => {
                    // Apply a single material to all meshes
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x543391,
                        roughness: 0.5,
                        metalness: 0.5
                    });
                    object.traverse((child) => {
                        if (child instanceof THREE.Mesh) {
                            child.material = material;
                        }
                    });
                    model = object;
                    model.position.y = 0.7;
                    scene.add(model);
                    loading.style.display = 'none';
                },
                // (xhr) => {
                //     console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                // },
                // (error) => {
                //     console.error('An error happened', error);
                //     loading.textContent = 'Failed to load model';
                // }
            );


            // Add OrbitControls
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false;


            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                if (model){
                    // model.rotation.y += 0.01;
                    model.rotation.y += 0.001;
                }
                renderer.render(scene, camera);
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            // Start animation
            loading.style.display = 'none';
            animate();
        }


    document.addEventListener('DOMContentLoaded', () => {
        const currentScheme = document.body.getAttribute('data-md-color-scheme')
        run_anim(currentScheme);

        // Subscribe to document$
        if (window.document$) {
            document$.subscribe(function() {
                const currentScheme = document.body.getAttribute('data-md-color-scheme')
                run_anim(currentScheme);
            });
        }

        // Rerun on theme change
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'data-md-color-scheme') {
                    const newScheme = document.body.getAttribute('data-md-color-scheme');
                    run_anim(newScheme);
                }
            });
        });

        observer.observe(document.body, {
            attributes: true,
            attributeFilter: ['data-md-color-scheme']
        });
    });
    </script>
{% endblock %}
